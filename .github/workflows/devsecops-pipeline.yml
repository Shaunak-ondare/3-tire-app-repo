name: DevSecOps Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  security-events: write

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
  MANIFEST_REPO: 'Shaunak-ondare/argocd-repo-fr-deployment'
  GIT_EMAIL: 'github-actions@github.com'
  GIT_NAME: 'GitHub Actions'

jobs:
  sast_sca:
    name: SAST & SCA Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt coverage

      - name: Run backend tests with coverage
        run: python -m coverage run --source=backend/app -m unittest discover -s backend/tests && python -m coverage xml -o backend/coverage.xml

      - name: SonarCloud Scan (SAST)
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        
      - name: Snyk Vulnerability Scan (SCA)
        uses: snyk/actions/setup@master
        
      - name: Run Snyk Test
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          # Run Snyk and capture the exit code
          snyk test --all-projects || EXIT_CODE=$?
          
          # Snyk Exit Codes:
          # 0 = No vulns found
          # 1 = Vulns found
          # 2 = Execution error (e.g. couldn't scan)
          
          if [ "$EXIT_CODE" = "2" ]; then
            echo "Snyk failed to execute properly. Breaking the pipeline!"
            exit 1
          fi
          
          echo "Snyk scan completed successfully. Bypassing vulnerability failure."
          exit 0

  build_and_scan_containers:
    name: Build & Container Scan
    runs-on: ubuntu-latest
    needs: sast_sca
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Backend Image
        run: docker build -t todo-backend:${{ github.sha }} ./backend

      - name: Build Frontend Image
        run: docker build -t todo-frontend:${{ github.sha }} ./frontend

      - name: Trivy Vulnerability Scanner (Backend)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'todo-backend:${{ github.sha }}'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: 'true'
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Trivy Vulnerability Scanner (Frontend)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'todo-frontend:${{ github.sha }}'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: 'true'
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Set up Java for HawkScan
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Run App Locally for DAST
        run: |
          docker compose up -d --build postgres backend

      - name: Verify Backend Health
        run: |
          for i in {1..24}; do
            if curl --fail --silent http://localhost:5000/api/health > /dev/null; then
              exit 0
            fi
            sleep 5
          done
          echo "Backend did not become healthy in time."
          docker compose logs backend postgres
          exit 1

      - name: Debug StackHawk Config
        run: |
          pwd
          git rev-parse HEAD
          sed -n '1,80p' stackhawk.yml

      - name: StackHawk DAST Scan
        uses: stackhawk/hawkscan-action@v2.2.0
        continue-on-error: true
        env:
          STACKHAWK_APP_ID: ${{ secrets.STACKHAWK_APP_ID }}
          APP_HOST: http://localhost:5000
          APP_ENV: Development
        with:
          apiKey: ${{ secrets.HAWK_API_KEY }}
          configurationFiles: stackhawk.yml
          codeScanningAlerts: true
          githubToken: ${{ github.token }}

      - name: Stop DAST Services
        if: always()
        run: docker compose down -v

      - name: Log in to Docker Hub
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push to Docker Hub
        if: github.ref == 'refs/heads/main'
        run: |
          docker tag todo-backend:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/todo-backend:${{ github.sha }}
          docker tag todo-backend:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/todo-backend:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/todo-backend:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/todo-backend:latest

          docker tag todo-frontend:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/todo-frontend:${{ github.sha }}
          docker tag todo-frontend:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/todo-frontend:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/todo-frontend:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/todo-frontend:latest

  update_manifests:
    name: GitOps - Update Manifests
    runs-on: ubuntu-latest
    needs: build_and_scan_containers
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout Manifest Repo
        uses: actions/checkout@v3
        with:
          repository: ${{ env.MANIFEST_REPO }}
          token: ${{ secrets.PAT_TOKEN }} # Personal Access Token needed to push to another repo
          path: manifests

      - name: Update Image Tags
        run: |
          cd manifests/base
          # Using sed to update the image tag. Assuming the image line is like:
          # image: your-dockerhub-user/todo-backend:latest
          sed -i "s|image: .*/todo-backend:.*|image: ${{ secrets.DOCKER_USERNAME }}/todo-backend:${{ github.sha }}|g" backend.yaml
          sed -i "s|image: .*/todo-frontend:.*|image: ${{ secrets.DOCKER_USERNAME }}/todo-frontend:${{ github.sha }}|g" frontend.yaml

      - name: Commit and Push Changes
        run: |
          cd manifests
          git config user.name "$GIT_NAME"
          git config user.email "$GIT_EMAIL"
          git add base/backend.yaml base/frontend.yaml
          git commit -m "GitOps: Update image tags to ${{ github.sha }}"
          git push origin main
