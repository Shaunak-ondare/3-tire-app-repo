# Required metadata
sonar.projectKey=Shaunak-ondare_3-tire-app-repo
sonar.organization=shaunak-ondare

# This is the name and version displayed in the SonarCloud UI
sonar.projectName=3-tire-app-repo

# Comma-separated paths to directories containing source files.
# Since this file sits in the app/ folder, we point it to the source code of both tiers.
sonar.sources=frontend/src, backend

# Comma-separated paths to directories to exclude from analysis (e.g., dependencies, temp files)
sonar.exclusions=frontend/node_modules/**, frontend/dist/**, backend/venv/**, backend/__pycache__/**, **/*.test.js, **/*.spec.js

# Encoding of the source code. Default is system encoding.
sonar.sourceEncoding=UTF-8

# Python specific: path to coverage reports (if you add unit tests later)
# sonar.python.coverage.reportPaths=backend/coverage.xml

# JavaScript specific: path to lcov reports (if you add unit tests later)
# sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info
