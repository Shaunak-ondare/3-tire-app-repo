app:
  # Supply the real StackHawk application ID at runtime via CI secret.
  applicationId: ${STACKHAWK_APP_ID}

  # Allow CI/local overrides while keeping sensible defaults.
  env: ${APP_ENV:Development}
  host: ${APP_HOST:http://localhost:5000}

  # The backend root is a 404 and this app is a REST API, so we point
  # HawkScan at known API routes and wait for the health endpoint.
  waitForAppTarget:
    path: /api/health
    waitTimeoutMillis: 120000
    pollDelay: 5000

  includePaths:
    - /api/health
    - /api/todos.*
    - /api/stats

hawk:
  failureThreshold: high
  spider:
    baseSpider:
      enabled: true
    seedPaths:
      - /api/health
      - /api/todos
      - /api/stats
